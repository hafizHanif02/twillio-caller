databases:
  - name: twilio-calls-db
    plan: free
    databaseName: twilio_calls
    user: twilio_user

services:
  # Backend API
  - type: web
    name: twilio-caller-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: twilio-calls-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WS_HEARTBEAT_INTERVAL
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.6"

  # Frontend Static Site
  - type: web
    name: twilio-caller-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
      - key: NODE_VERSION
        value: "18.19.0"
